<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1208;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D0D11;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#D4A853" stroke-width="8" opacity="0.4"/>
  <!-- Central diamond/hub -->
  <polygon points="256,90 366,200 256,310 146,200" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linejoin="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="200" r="18" fill="url(#gold)"/>
  <!-- 4 satellite nodes -->
  <circle cx="256" cy="70" r="22" fill="#D4A853" opacity="0.9"/>
  <circle cx="390" cy="200" r="22" fill="#74C98C" opacity="0.9"/>
  <circle cx="256" cy="330" r="22" fill="#60A5FA" opacity="0.9"/>
  <circle cx="122" cy="200" r="22" fill="#A78BFA" opacity="0.9"/>
  <!-- Connection lines to center -->
  <line x1="256" y1="90" x2="256" y2="182" stroke="#D4A853" stroke-width="4" opacity="0.6"/>
  <line x1="368" y1="200" x2="274" y2="200" stroke="#74C98C" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="308" x2="256" y2="218" stroke="#60A5FA" stroke-width="4" opacity="0.6"/>
  <line x1="138" y1="200" x2="238" y2="200" stroke="#A78BFA" stroke-width="4" opacity="0.6"/>
  <!-- "multi" text -->
  <text x="256" y="410" font-family="Georgia,serif" font-size="70" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="2">multi</text>
  <!-- "IA" text -->
  <text x="256" y="470" font-family="Georgia,serif" font-size="46" fill="#666677" text-anchor="middle" letter-spacing="4">IA</text>
</svg>
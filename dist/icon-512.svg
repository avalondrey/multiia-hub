<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F13"/>
      <stop offset="100%" style="stop-color:#1A1A24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A853"/>
      <stop offset="100%" style="stop-color:#F0C060"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="192" height="192" rx="38" fill="none" stroke="#D4A853" stroke-width="3" opacity="0.6"/>
  <!-- Grid dots decoration -->
  <circle cx="30" cy="30" r="2" fill="#D4A853" opacity="0.3"/>
  <circle cx="162" cy="30" r="2" fill="#D4A853" opacity="0.3"/>
  <circle cx="30" cy="162" r="2" fill="#D4A853" opacity="0.3"/>
  <circle cx="162" cy="162" r="2" fill="#D4A853" opacity="0.3"/>
  <!-- Main "m" letter -->
  <text x="96" y="85" text-anchor="middle" font-family="serif" font-weight="900" font-size="62" fill="url(#glow)">m</text>
  <!-- "IA" text -->
  <text x="96" y="138" text-anchor="middle" font-family="monospace" font-weight="700" font-size="34" fill="#D4A853" opacity="0.9">IA</text>
  <!-- Bottom sparkle dots -->
  <circle cx="72" cy="158" r="3" fill="#D4A853" opacity="0.5"/>
  <circle cx="96" cy="162" r="3" fill="#D4A853" opacity="0.7"/>
  <circle cx="120" cy="158" r="3" fill="#D4A853" opacity="0.5"/>
</svg>
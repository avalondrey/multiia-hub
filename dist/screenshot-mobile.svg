  <text x="16" y="120" font-family="monospace" font-size="8" fill="#D4A853">Comment fonctionne</text>
  <text x="16" y="133" font-family="monospace" font-size="8" fill="#D4A853">un LLM ?</text>
  <rect x="8" y="160" width="175" height="80" rx="6" fill="#14140A"/>
  <text x="14" y="176" font-family="monospace" font-size="7" fill="#BBB">Un LLM (Large Language</text>
  <text x="14" y="188" font-family="monospace" font-size="7" fill="#BBB">Model) est un réseau de</text>
  <text x="14" y="200" font-family="monospace" font-size="7" fill="#BBB">neurones entraîné sur</text>
  <text x="14" y="212" font-family="monospace" font-size="7" fill="#BBB">des milliards de tokens…</text>
  <text x="14" y="228" font-family="monospace" font-size="7" fill="#555">🔊 ⎘</text>
  <!-- Messages right -->
  <rect x="203" y="100" width="140" height="50" rx="6" fill="#0E1E10"/>
  <text x="211" y="120" font-family="monospace" font-size="8" fill="#74C98C">Comment fonctionne</text>
  <text x="211" y="133" font-family="monospace" font-size="8" fill="#74C98C">un LLM ?</text>
  <rect x="203" y="160" width="180" height="80" rx="6" fill="#0A140A"/>
  <text x="209" y="176" font-family="monospace" font-size="7" fill="#BBB">Les LLMs sont des</text>
  <text x="209" y="188" font-family="monospace" font-size="7" fill="#BBB">transformers avec des</text>
  <text x="209" y="200" font-family="monospace" font-size="7" fill="#BBB">milliards de paramètres</text>
  <text x="209" y="212" font-family="monospace" font-size="7" fill="#BBB">entraînés par gradient…</text>
  <text x="209" y="228" font-family="monospace" font-size="7" fill="#555">🔊 ⎘</text>

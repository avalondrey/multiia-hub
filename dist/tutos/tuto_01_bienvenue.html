<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tuto 01 Bienvenue</title>
<style>

:root{
  --bg:#09090B;--s1:#18181c;--s2:#222228;
  --bd:rgba(255,255,255,.09);--tx:#F0EEE8;--mu:#666674;
  --ac:#D4A853;--green:#4ADE80;--blue:#60A5FA;
  --orange:#F97316;--purple:#A78BFA;--red:#F87171;
  --ff:-apple-system,'Segoe UI',system-ui,sans-serif;
  --fm:'SF Mono',Consolas,'Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:var(--ff);user-select:none;}

/* CHROME */
.pt{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.07);z-index:99;}
.pf{height:100%;transition:width .45s ease;}
.cnt{position:fixed;top:14px;right:18px;z-index:99;font-family:var(--fm);font-size:10px;color:var(--mu);}
.pbtn{position:fixed;top:10px;left:14px;z-index:99;padding:4px 11px;border-radius:5px;font-size:9px;cursor:pointer;font-family:var(--fm);border:1px solid;}
.dots{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:99;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bd);border:1px solid var(--mu);cursor:pointer;transition:all .3s;}
.navr{position:fixed;bottom:18px;right:18px;display:flex;gap:8px;z-index:99;}
.ab{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd);background:var(--s1);color:var(--mu);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ab:disabled{opacity:.3;cursor:not-allowed;}

/* STAGE — single slot, one slide at a time */
#stage{position:fixed;inset:0;overflow:hidden;}
.sw{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(20px,5vw,70px);
}
.sw.in-r{animation:inR .36s cubic-bezier(.4,0,.2,1) both;}
.sw.in-l{animation:inL .36s cubic-bezier(.4,0,.2,1) both;}
.sw.out-l{animation:outL .3s cubic-bezier(.4,0,.2,1) both;pointer-events:none;}
.sw.out-r{animation:outR .3s cubic-bezier(.4,0,.2,1) both;pointer-events:none;}
@keyframes inR {from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes inL {from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
@keyframes outL{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(-40px);}}
@keyframes outR{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(40px);}}

/* CONTENT ANIMATIONS — play once on each slide entry */
@keyframes hi{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes gi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes si{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
@keyframes sc{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}

/* HERO */
.hbg{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.hbg::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:glow 4s ease-in-out infinite;}
.hgrid{position:absolute;inset:0;background-size:55px 55px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);}
@keyframes glow{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.12);}}
.hlogo{font-weight:800;font-size:clamp(32px,5.5vw,72px);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;animation:hi .8s .1s both;line-height:1.1;text-align:center;}
.hsub{font-size:clamp(12px,2vw,17px);color:var(--mu);margin-top:10px;position:relative;z-index:1;text-align:center;animation:hi .8s .3s both;}
.hbadge{margin-top:24px;padding:9px 24px;border-radius:20px;font-size:12px;font-family:var(--fm);position:relative;z-index:1;animation:hi .8s .5s both;cursor:pointer;transition:all .2s;border:1px solid;}
.hlbl{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--mu);margin-bottom:14px;text-transform:uppercase;position:relative;z-index:1;animation:hi .8s 0s both;}
.hicon{font-size:52px;position:relative;z-index:1;margin-bottom:8px;animation:hi .8s 0s both;}

/* COMPONENTS */
.lbl{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--mu);margin-bottom:14px;text-transform:uppercase;}
h2{font-weight:800;font-size:clamp(20px,4vw,44px);line-height:1.1;}
.sub{font-size:clamp(11px,2vw,15px);color:var(--mu);line-height:1.7;max-width:560px;text-align:center;margin-top:12px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:580px;width:100%;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:560px;width:100%;}
.gc{padding:14px 12px;border-radius:9px;background:var(--s1);border:1px solid var(--bd);text-align:center;animation:gi .5s both;}
.gi{font-size:24px;margin-bottom:7px;}
.gt{font-weight:700;font-size:11px;color:var(--tx);}
.gs{font-size:8px;color:var(--mu);margin-top:2px;}
.srow{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:8px;background:var(--s1);border:1px solid var(--bd);animation:si .4s both;}
.snum{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;font-weight:600;flex-shrink:0;}
.st{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.sd{font-size:9px;color:var(--mu);}
.cta{padding:9px 20px;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--fm);font-weight:600;transition:transform .2s;letter-spacing:.02em;}
.cta:hover{transform:scale(1.03);}
.csec{background:transparent;border:1px solid var(--bd);color:var(--mu);}
.csec:hover{border-color:var(--ac);color:var(--ac);}

@media print{
  body{overflow:visible;height:auto;}
  .pt,.cnt,.pbtn,.dots,.navr{display:none!important;}
  #stage{position:static;overflow:visible;height:auto;}
  .sw{position:static;display:flex!important;height:100vh;page-break-after:always;animation:none!important;}
}

.pf{background:linear-gradient(90deg,#D4A853,#F0C87A);}
.ab:hover:not(:disabled){border-color:#D4A853;color:#D4A853;}
.hbg::before{background:radial-gradient(circle,#D4A85318 0%,transparent 70%);}
.hgrid{background-image:linear-gradient(#D4A85305 1px,transparent 1px),linear-gradient(90deg,#D4A85305 1px,transparent 1px);}
</style>
</head>

<script>

(function(){
  var cur=0, busy=false;
  var T=0; // set by each tuto

  // Called by each tuto to register slide count
  window.initTuto=function(total){
    T=total;
    // Dots
    var de=document.getElementById('dots');
    de.innerHTML='';
    for(var i=0;i<T;i++){
      var d=document.createElement('div');
      d.className='dot';
      (function(n){d.onclick=function(){go(n);};})(i);
      de.appendChild(d);
    }
    renderSlide(0,'none');
  };

  function pad(n){return n<10?'0'+n:''+n;}

  function renderSlide(n, dir){
    var stage=document.getElementById('stage');
    var old=stage.querySelector('.sw');
    var html=window.SLIDES[n];

    // Create new wrapper
    var wrap=document.createElement('div');
    wrap.className='sw';
    if(dir==='right') wrap.classList.add('in-r');
    else if(dir==='left') wrap.classList.add('in-l');
    wrap.innerHTML=html;
    stage.appendChild(wrap);

    // Animate out old
    if(old){
      old.classList.remove('in-r','in-l');
      if(dir==='right') old.classList.add('out-l');
      else if(dir==='left') old.classList.add('out-r');
      (function(el){setTimeout(function(){el.remove();},320);})(old);
    }

    // Update chrome
    document.querySelectorAll('.dot').forEach(function(d,i){
      d.style.background=i===n?window.TCOLOR:'';
      d.style.borderColor=i===n?window.TCOLOR:'';
      d.style.transform=i===n?'scale(1.3)':'';
    });
    var pf=document.getElementById('pf');
    if(pf) pf.style.width=((n+1)/T*100)+'%';
    var cn=document.getElementById('cnt');
    if(cn) cn.textContent=pad(n+1)+' / '+pad(T);
    var pb2=document.getElementById('pb2');
    if(pb2) pb2.disabled=(n===0);
    var nb=document.getElementById('nb');
    if(nb) nb.disabled=(n===T-1);
  }

  function go(n){
    if(busy||n===cur||n<0||n>=T) return;
    busy=true;
    var dir=n>cur?'right':'left';
    cur=n;
    renderSlide(cur,dir);
    setTimeout(function(){busy=false;},380);
  }

  window.nextSlide=function(){go(cur+1);};
  window.prevSlide=function(){go(cur-1);};
  window.goTo=function(n){go(n);};

  // Keys
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();window.nextSlide();}
    else if(e.key==='ArrowLeft'){e.preventDefault();window.prevSlide();}
    else if(e.key==='Home') go(0);
    else if(e.key==='End') go(T-1);
  });

  // Touch
  var tx=null;
  document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',function(e){
    if(tx===null)return;
    var dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50){dx<0?window.nextSlide():window.prevSlide();}
    tx=null;
  });

  // Click nav
  document.addEventListener('click',function(e){
    var skip=['button','a','input','.dot','.pbtn','.hbadge','.cta','.csec','.np'];
    for(var i=0;i<skip.length;i++){
      if(e.target.closest&&e.target.closest(skip[i]))return;
    }
    if(e.clientX>window.innerWidth/2) window.nextSlide();
    else window.prevSlide();
  });
})();
